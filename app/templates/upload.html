{% extends "base.html" %}

{% block title %}toctoc — 영수증 등록{% endblock %}

{% block content %}
<div x-data="{
    files: [],
    uploading: false,
    dragover: false,
    maxFiles: 20,
    handleFiles(inputFiles) {
        const arr = Array.from(inputFiles);
        if (arr.length > this.maxFiles) {
            alert(`한 번에 최대 ${this.maxFiles}장까지 업로드할 수 있습니다.`);
            this.$refs.fileInput.value = '';
            return;
        }
        this.files = arr;
    },
    removeFile(index) {
        this.files.splice(index, 1);
        // 파일 input 초기화
        this.$refs.fileInput.value = '';
    }
}">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">영수증 등록</h1>

    <!-- 드래그앤드롭 / 파일 선택 영역 -->
    <form id="upload-form"
          hx-post="/api/receipts/upload"
          hx-target="#upload-result"
          hx-swap="innerHTML"
          hx-encoding="multipart/form-data"
          @htmx:before-request="uploading = true"
          @htmx:after-request="uploading = false; files = []; $refs.fileInput.value = ''">

        <div class="mb-6"
             @dragover.prevent="dragover = true"
             @dragleave.prevent="dragover = false"
             @drop.prevent="dragover = false; handleFiles($event.dataTransfer.files); $refs.fileInput.files = $event.dataTransfer.files">

            <label :class="dragover ? 'border-blue-500 bg-blue-50' : 'border-gray-300 bg-white'"
                   class="flex flex-col items-center justify-center min-h-[200px] border-2 border-dashed rounded-lg cursor-pointer hover:border-blue-400 transition-colors">
                <div class="flex flex-col items-center py-8">
                    <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    <p class="text-base text-gray-600 mb-1">이미지를 드래그하거나 클릭하세요</p>
                    <p class="text-sm text-gray-400">JPG, PNG, HEIC (최대 {{ max_file_size }}MB, 20장)</p>
                </div>
                <input type="file"
                       name="files"
                       x-ref="fileInput"
                       @change="handleFiles($event.target.files)"
                       accept=".jpg,.jpeg,.png,.heic"
                       multiple
                       class="hidden">
            </label>
        </div>

        <!-- 선택된 파일 목록 -->
        <template x-if="files.length > 0">
            <div class="mb-6">
                <p class="text-base font-medium text-gray-700 mb-2">
                    선택된 파일 (<span x-text="files.length"></span>)
                </p>
                <div class="space-y-2">
                    <template x-for="(file, index) in files" :key="index">
                        <div class="flex items-center justify-between bg-white rounded-lg shadow-sm p-3">
                            <div class="flex items-center gap-3 min-w-0">
                                <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                </svg>
                                <span class="text-base text-gray-700 truncate" x-text="file.name"></span>
                            </div>
                            <button type="button"
                                    @click="removeFile(index)"
                                    class="min-h-[48px] min-w-[48px] flex items-center justify-center text-gray-400 hover:text-red-500 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                </svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- 업로드 버튼 -->
        <button type="submit"
                :disabled="files.length === 0 || uploading"
                :class="files.length === 0 || uploading ? 'bg-gray-300 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'"
                class="w-full min-h-[48px] text-base font-medium text-white rounded-lg transition-colors flex items-center justify-center gap-2">
            <template x-if="uploading">
                <div class="flex items-center gap-2">
                    <div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    <span>OCR 분석 중...</span>
                </div>
            </template>
            <template x-if="!uploading">
                <span>영수증 등록하기</span>
            </template>
        </button>
    </form>

    <!-- 업로드 결과 -->
    <div id="upload-result" class="mt-6"></div>
</div>
{% endblock %}
