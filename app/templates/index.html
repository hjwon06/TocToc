{% extends "base.html" %}

{% block title %}toctoc — 영수증 목록{% endblock %}

{% block content %}
<div x-data="{
    month: new URLSearchParams(location.search).get('month') || '',
    sort: new URLSearchParams(location.search).get('sort') || 'date_desc',
    page: parseInt(new URLSearchParams(location.search).get('page') || '1'),
    pushState() {
        let params = new URLSearchParams();
        if (this.month) params.set('month', this.month);
        if (this.sort !== 'date_desc') params.set('sort', this.sort);
        if (this.page > 1) params.set('page', this.page);
        const qs = params.toString();
        const url = qs ? '?' + qs : '/';
        history.replaceState(null, '', url);
    },
    loadReceipts() {
        const params = new URLSearchParams({page: this.page, size: 20, sort: this.sort});
        if (this.month) params.set('month', this.month);
        htmx.ajax('GET', '/api/receipts?' + params.toString(), {target: '#receipt-list', swap: 'innerHTML'});
    },
    applyFilter() {
        this.page = 1;
        this.pushState();
        this.loadReceipts();
    }
}" x-init="pushState(); $nextTick(() => loadReceipts())"
   @receipt-deleted.window="loadReceipts()"
   @receipt-updated.window="loadReceipts()">
    <!-- 필터 바 -->
    <div class="flex items-center gap-3 mb-4">
        <div class="flex-1">
            <input type="month"
                   x-model="month"
                   @change="applyFilter()"
                   class="w-full min-h-[48px] px-3 text-base rounded-lg border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="월 선택">
        </div>
        <select x-model="sort"
                @change="applyFilter()"
                class="min-h-[48px] px-3 text-base rounded-lg border border-gray-200 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <option value="date_desc">최신순</option>
            <option value="date_asc">오래된순</option>
            <option value="amount_desc">금액 높은순</option>
            <option value="amount_asc">금액 낮은순</option>
        </select>
    </div>

    <!-- 영수증 목록 -->
    <div id="receipt-list">
        <div class="text-center py-8">
            <div class="inline-block w-8 h-8 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-base text-gray-500 mt-2">불러오는 중...</p>
        </div>
    </div>
</div>
{% endblock %}
